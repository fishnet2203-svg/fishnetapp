<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EcoHuella</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --v:#2C5F2D;--v2:#3d7a3e;--m:#97BC62;--cr:#F5F1E8;
  --ca:#5C3D11;--bl:#FAFAF7;--gr:#6B7280;--ro:#C0392B;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--v);overflow:hidden}
body{font-family:'DM Sans',sans-serif;color:#1a1a1a;max-width:430px;margin:0 auto;background:var(--bl);height:100vh;display:flex;flex-direction:column}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scan{0%,100%{top:10px}50%{top:calc(100% - 14px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fillbar{to{width:100%}}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,var(--v) 0%,#1a3d1b 55%,var(--ca) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .7s,transform .7s}
#splash.out{opacity:0;transform:scale(1.05);pointer-events:none}
.sp-ic{font-size:80px;animation:float 2.2s ease-in-out infinite}
.sp-t{font-family:'Playfair Display',serif;font-size:44px;font-weight:900;color:var(--cr);margin:14px 0 4px}
.sp-s{color:var(--m);font-size:11px;letter-spacing:3px;text-transform:uppercase}
.sp-bar{margin-top:52px;width:56px;height:3px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.sp-fill{height:100%;background:var(--m);border-radius:2px;width:0;animation:fillbar 2s ease forwards}

/* SCREENS */
.scr{display:none;flex-direction:column;flex:1;overflow:hidden}
.scr.on{display:flex}

/* AUTH */
#scr-auth{background:linear-gradient(160deg,var(--v) 0%,#1a3d1b 52%,var(--ca) 100%);justify-content:center;align-items:center;padding:28px 24px;overflow-y:auto}
.auth-logo{text-align:center;margin-bottom:28px;animation:fadeUp .6s ease}
.auth-logo h1{font-family:'Playfair Display',serif;font-size:38px;font-weight:900;color:var(--cr)}
.auth-logo p{color:var(--m);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;margin-top:4px}
.auth-card{background:#fff;border-radius:24px;padding:24px 20px;width:100%;box-shadow:0 16px 48px rgba(0,0,0,.35);animation:fadeUp .6s .1s ease both}
.atabs{display:flex;gap:4px;background:#ededea;border-radius:12px;padding:4px;margin-bottom:18px}
.atab{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--gr);transition:all .2s;border:none;background:transparent;font-family:'DM Sans',sans-serif}
.atab.on{background:var(--v);color:#fff}
.aform{display:none}.aform.on{display:block}

/* INPUTS — sin margin-bottom para evitar problemas */
.inp-wrap{margin-bottom:12px}
.inp-wrap label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:5px}
.inp{width:100%;padding:14px 16px;border:2px solid #e0e0d8;border-radius:12px;font-size:16px;font-family:'DM Sans',sans-serif;background:#fff;outline:none;transition:border .2s;-webkit-appearance:none;appearance:none;color:#1a1a1a}
.inp:focus{border-color:var(--v);background:#fff}
.inp::placeholder{color:#aaa}

/* BOTÓN — grande y claro */
.btnp{
  display:block;width:100%;padding:16px;
  background:var(--v);color:#fff;
  border:none;border-radius:14px;
  font-size:17px;font-weight:700;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  margin-top:4px;letter-spacing:.3px;
  -webkit-appearance:none;appearance:none;
  transition:background .2s,transform .1s;
}
.btnp:active{background:#1e4520;transform:scale(.98)}

/* ERROR MSG */
.err-msg{background:#FEE2E2;color:var(--ro);border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:12px;display:none;border-left:3px solid var(--ro)}
.err-msg.on{display:block}

/* HEADER */
.hdr{padding:14px 18px 10px;background:#fff;border-bottom:1px solid rgba(0,0,0,.06);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hav{width:36px;height:36px;border-radius:50%;background:var(--v);display:flex;align-items:center;justify-content:center;font-size:17px}
.hgr{font-size:11px;color:var(--gr)}.hnm{font-size:16px;font-weight:700}
.nbtn{width:36px;height:36px;border-radius:50%;background:#f0f0ea;border:none;cursor:pointer;font-size:17px;position:relative;display:flex;align-items:center;justify-content:center}
.ndot{position:absolute;top:5px;right:5px;width:8px;height:8px;background:var(--ro);border-radius:50%;border:2px solid #fff}
.sc{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:88px}
.sc::-webkit-scrollbar{display:none}

/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid rgba(0,0,0,.07);display:flex;padding:7px 0 calc(7px + env(safe-area-inset-bottom));z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.08)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:5px 0}
.ni-i{font-size:22px;transition:transform .2s}.ni-l{font-size:10px;color:var(--gr);font-weight:500}
.ni.on .ni-i{transform:scale(1.18)}.ni.on .ni-l{color:var(--v);font-weight:700}

/* HOME */
.hero{margin:14px;border-radius:20px;background:linear-gradient(135deg,var(--v),var(--v2));padding:22px 18px;color:#fff;position:relative;overflow:hidden}
.hero::after{content:'🌿';position:absolute;right:-8px;bottom:-18px;font-size:96px;opacity:.12;pointer-events:none}
.hero h2{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:5px}
.hero p{font-size:13px;opacity:.85;line-height:1.5}
.eco-row{display:flex;gap:8px;margin-top:14px}
.ecb{background:rgba(255,255,255,.18);backdrop-filter:blur(4px);border-radius:50px;padding:6px 14px;display:flex;align-items:center;gap:6px}
.ecn{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}.ecl{font-size:11px;opacity:.8}
.sec{font-size:17px;font-weight:700;padding:14px 14px 8px}
.qgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}
.qc{background:#fff;border:1.5px solid #e8e8e0;border-radius:16px;padding:14px 12px;cursor:pointer;transition:all .18s}
.qc:active{transform:scale(.97);background:#f5f5f0}
.qi{font-size:28px;margin-bottom:8px}.qt{font-size:13px;font-weight:600}.qs{font-size:11px;color:var(--gr);margin-top:2px}
.prow{display:flex;gap:12px;padding:0 14px 4px;overflow-x:auto}
.prow::-webkit-scrollbar{display:none}
.pc{min-width:148px;background:#fff;border-radius:16px;border:1.5px solid #e8e8e0;padding:14px;cursor:pointer;flex-shrink:0;transition:all .18s}
.pc:active{transform:scale(.97)}
.pe{font-size:34px;margin-bottom:8px}.pn{font-size:13px;font-weight:600}.ps{font-size:11px;color:var(--gr);margin-bottom:8px}
.hb{height:5px;background:#e8e8e0;border-radius:3px;overflow:hidden}
.hbf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--m),var(--v))}
.hbt{font-size:10px;color:var(--gr);margin-top:4px}
.est{text-align:center;padding:28px 14px}.esti{font-size:48px;margin-bottom:12px}.estt{font-size:14px;color:var(--gr);line-height:1.5}
.alst{padding:0 14px;display:flex;flex-direction:column;gap:10px}
.alc{background:#fff;border-radius:14px;padding:14px;display:flex;align-items:center;gap:12px;border:1.5px solid #e8e8e0}
.ali{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;background:#EFF6FF}
.alb{margin-left:auto;padding:4px 10px;border-radius:50px;font-size:11px;font-weight:600}
.urg{background:#FEE2E2;color:var(--ro)}.hoy{background:#FEF3C7;color:#92400E}.okb{background:#F0FDF4;color:#166534}
.tip{margin:0 14px 14px;background:linear-gradient(135deg,#f0f7f0,#e8f5e9);border-radius:16px;padding:16px;border-left:4px solid var(--v)}
.tipl{font-size:10px;font-weight:700;color:var(--v);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.tipt{font-size:13px;color:#2a2a2a;line-height:1.5}

/* DIAGNÓSTICO */
.dwrap{margin:0 14px 14px;border-radius:20px;overflow:hidden;border:1.5px solid #e8e8e0;background:#fff}
.czn{position:relative;background:#0d0d0d;min-height:220px;display:flex;align-items:center;justify-content:center;overflow:hidden;border-radius:20px 20px 0 0}
.cph{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:36px 20px;text-align:center;gap:8px}
.cph .ci{font-size:52px}.cph .ct{font-size:17px;font-weight:700;color:#fff}.cph .cs{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5;max-width:230px}
#cvid{width:100%;display:block;object-fit:cover;max-height:320px}
#cprev{width:100%;display:block;object-fit:cover;max-height:320px}
#ccan{display:none}
.vfx{position:absolute;inset:0;pointer-events:none}
.vfc{position:absolute;width:26px;height:26px;border-color:#4eff91;border-style:solid}
.vfc.tl{top:12px;left:12px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.vfc.tr{top:12px;right:12px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.vfc.bl{bottom:12px;left:12px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.vfc.br{bottom:12px;right:12px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.vfs{position:absolute;left:12px;right:12px;height:2px;background:linear-gradient(90deg,transparent,#4eff91,transparent);animation:scan 2.2s ease-in-out infinite}
.vfbg{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#4eff91;font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;white-space:nowrap}
.cctrl{display:flex;gap:10px;padding:12px 14px;background:#f8f8f5}
.cb{flex:1;padding:13px 8px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .18s;-webkit-appearance:none}
.cb:active{transform:scale(.96)}
.cb-cam{background:var(--v);color:#fff}.cb-gal{background:#f0f0ea;color:#1a1a1a}
.cb-cancel{background:#fee2e2;color:var(--ro)}.cb-snap{background:var(--v);color:#fff;flex:2}
.cb-analyze{background:linear-gradient(135deg,#1a3d1b,var(--v2));color:#fff;flex:2}.cb-retake{background:#f0f0ea;color:#1a1a1a}
.aiload{display:none;flex-direction:column;align-items:center;gap:12px;padding:28px 20px;text-align:center;background:linear-gradient(135deg,#f0f7f0,#fafaf5);border-top:1px solid #e8e8e0}
.aiload.on{display:flex}
.ai-sp{font-size:40px;animation:spin 2s linear infinite}
.ai-t{font-size:16px;font-weight:700;color:var(--v)}.ai-s{font-size:13px;color:var(--gr);line-height:1.5}
.ai-steps{display:flex;flex-direction:column;gap:6px;width:100%}
.ai-step{font-size:12px;padding:7px 14px;border-radius:50px;background:#e8f5e9;color:var(--v);font-weight:600;transition:all .3s;text-align:center}
.ai-step.act{background:var(--v);color:#fff;animation:pulse 1s ease-in-out infinite}
.ai-step.dn{background:#c8e6c9;color:#1b5e20}
.ai-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1a3d1b,var(--v2));color:#fff;border-radius:50px;padding:5px 14px;font-size:12px;font-weight:700;margin:4px 14px 12px}
.ai-dot{width:7px;height:7px;border-radius:50%;background:#4eff91;animation:pulse 1.2s ease-in-out infinite}
.drh{background:linear-gradient(135deg,var(--v),var(--v2));padding:20px;color:#fff}
.drp{font-family:'Playfair Display',serif;font-size:21px;font-weight:700}.drsp{font-size:12px;opacity:.8;margin-top:2px}
.drsc{text-align:center;padding:18px}
.drsn{font-family:'Space Mono',monospace;font-size:52px;font-weight:700}.drsl{font-size:12px;color:var(--gr);text-transform:uppercase;letter-spacing:1px}
.drb{padding:0 18px 18px}
.drst{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--gr);margin:14px 0 7px}
.drcd{font-size:16px;font-weight:700;margin-bottom:4px}.drcz{font-size:13px;color:var(--gr);line-height:1.5}
.dtag{display:inline-block;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;margin:3px}
.tg{background:#F0FDF4;color:#166534}.tr{background:#FEE2E2;color:var(--ro)}
.axitem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #f0f0ea}
.axic{font-size:17px;flex-shrink:0;margin-top:1px}.axtx{font-size:13px;color:#2a2a2a;line-height:1.5}
.drfull{font-size:13px;color:#2a2a2a;line-height:1.7;background:#f8f8f5;border-radius:12px;padding:14px;margin-top:6px}
.btnsave{width:calc(100% - 36px);margin:0 18px 18px;padding:14px;background:var(--v);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}

/* COMUNIDAD */
.vcard{margin:0 14px 12px;background:#fff;border-radius:16px;border:1.5px solid #e8e8e0;padding:15px;display:flex;gap:13px}
.vlog{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--v),var(--m));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.vnm{font-size:15px;font-weight:700;margin-bottom:3px}.vesp{font-size:12px;color:var(--gr);margin-bottom:7px}
.vtags{display:flex;gap:5px;flex-wrap:wrap}
.vtag{padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;background:#f0f7f0;color:var(--v)}
.vbtns{margin-top:9px;display:flex;gap:7px}
.vbtn{flex:1;padding:9px;border-radius:10px;border:1.5px solid var(--v);background:#fff;color:var(--v);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:4px;-webkit-appearance:none}
.vbtn.p{background:var(--v);color:#fff}.vbtn:active{transform:scale(.97)}

/* PERFIL */
.phdr{background:linear-gradient(160deg,var(--v),#1a3d1b);padding:28px 20px 22px;color:#fff;text-align:center}
.pav{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 10px}
.pnmx{font-family:'Playfair Display',serif;font-size:24px;font-weight:700}.pemx{font-size:13px;opacity:.75;margin-top:3px}
.pstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#e8e8e0;border-radius:16px;margin:14px;overflow:hidden}
.pst{background:#fff;padding:16px 10px;text-align:center}
.psn{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:var(--v)}.psl{font-size:11px;color:var(--gr);margin-top:3px}
.mit{display:flex;align-items:center;gap:14px;padding:16px;cursor:pointer;border-bottom:1px solid #f0f0ea}
.mit:active{background:#f5f5f0}
.mic{width:40px;height:40px;border-radius:12px;background:#f0f7f0;display:flex;align-items:center;justify-content:center;font-size:20px}
.mtt{font-size:15px;font-weight:600}.mts{font-size:12px;color:var(--gr)}
.logbtn{margin:14px;width:calc(100% - 28px);padding:14px;background:#FEE2E2;color:var(--ro);border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;-webkit-appearance:none}
.misc{margin:0 14px 12px;background:#f0f7f0;border-radius:14px;padding:16px}
.mistl{font-size:13px;font-weight:700;color:var(--v);margin-bottom:6px}.mistx{font-size:13px;color:#2a2a2a;line-height:1.6}

/* DIARIO */
.de{margin:0 14px 10px;background:#fff;border-radius:14px;border:1.5px solid #e8e8e0;padding:14px}
.demeta{display:flex;justify-content:space-between;margin-bottom:7px}
.dep{font-size:13px;font-weight:600;color:var(--v)}.ded{font-size:11px;color:var(--gr)}
.den{font-size:14px;color:#2a2a2a;line-height:1.5}
.deh{display:flex;align-items:center;gap:6px;margin-top:7px}
.dehl{font-size:11px;color:var(--gr)}.dehn{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:var(--v)}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.mo.on{opacity:1;pointer-events:all}
.mc{background:#fff;border-radius:24px 24px 0 0;padding:22px 20px 44px;width:100%;max-width:430px;transform:translateY(40px);transition:transform .32s cubic-bezier(.22,1,.36,1);max-height:90vh;overflow-y:auto}
.mo.on .mc{transform:translateY(0)}
.mh{width:36px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.mtl{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;margin-bottom:14px}
.fg{margin-bottom:14px}
.fl{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:6px;display:block}
.ep{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}
.eo{font-size:24px;width:44px;height:44px;border-radius:10px;border:2px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#f5f5f0}
.eo.sel{border-color:var(--v);background:#e8f5e9}
.si{width:100%;padding:14px 16px;border:1.5px solid #deded8;border-radius:12px;font-size:15px;font-family:'DM Sans',sans-serif;background:var(--bl);outline:none;-webkit-appearance:none;appearance:none}
.rw{display:flex;align-items:center;gap:12px}
.rw input[type=range]{flex:1;accent-color:var(--v)}
.rv{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:var(--v);width:38px;text-align:center}

/* TOAST */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:12px 22px;border-radius:50px;font-size:14px;font-weight:600;z-index:9998;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;max-width:92%;text-align:center}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-ic">🌿</div>
  <div class="sp-t">EcoHuella</div>
  <div class="sp-s">Tu comunidad · Tu planeta · Tu huella</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<div class="toast" id="toast"></div>

<!-- ══ AUTH ══ -->
<div class="scr on" id="scr-auth">
  <div class="auth-logo">
    <div style="font-size:56px;animation:float 2.5s ease-in-out infinite">🌱</div>
    <h1>EcoHuella</h1>
    <p>Tu comunidad · Tu planeta · Tu huella</p>
  </div>
  <div class="auth-card">
    <div class="atabs">
      <button class="atab on" onclick="stab('login')">Iniciar sesión</button>
      <button class="atab" onclick="stab('reg')">Registrarse</button>
    </div>

    <!-- LOGIN -->
    <div class="aform on" id="af-login">
      <div class="err-msg" id="err-login"></div>
      <div class="inp-wrap">
        <label>Correo electrónico</label>
        <input class="inp" type="email" id="li-em" placeholder="tucorreo@email.com" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
      </div>
      <div class="inp-wrap">
        <label>Contraseña</label>
        <input class="inp" type="password" id="li-pw" placeholder="Tu contraseña" autocomplete="off">
      </div>
      <button class="btnp" type="button" onclick="doLogin()">✅ Iniciar sesión</button>
    </div>

    <!-- REGISTRO -->
    <div class="aform" id="af-reg">
      <div class="err-msg" id="err-reg"></div>
      <div class="inp-wrap">
        <label>Nombre completo</label>
        <input class="inp" type="text" id="re-nm" placeholder="Tu nombre" autocomplete="off" autocorrect="off" autocapitalize="words">
      </div>
      <div class="inp-wrap">
        <label>Correo electrónico</label>

<script>
// ════════════════════════════════════════════════
// BASE DE DATOS EN MEMORIA — funciona en cualquier
// entorno sin importar restricciones de storage
// ════════════════════════════════════════════════
const MEM = {
  usuarios: [],
  plantas:  [],
  diario:   [],
  diags:    [],
  seq: { u:1, p:1, d:1, g:1 }
};

// Intentar cargar desde localStorage (puede fallar en WhatsApp)
function tryLoad() {
  try {
    const raw = localStorage.getItem('eco_v4');
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.usuarios) {
        Object.assign(MEM, parsed);
      }
    }
  } catch(e) { /* localStorage bloqueado — continuar en memoria */ }
}

// Intentar guardar (silencioso si falla)
function trySave() {
  try { localStorage.setItem('eco_v4', JSON.stringify(MEM)); } catch(e) {}
  try { sessionStorage.setItem('eco_v4', JSON.stringify(MEM)); } catch(e) {}
}

// Fecha de hoy
function hoy() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// IDs
function nid(t) { const id = MEM.seq[t]||1; MEM.seq[t] = id+1; return id; }

// ── Usuarios ──
function userByEmail(em) { return MEM.usuarios.find(u => u.email.toLowerCase() === em.toLowerCase()); }
function userById(id)    { return MEM.usuarios.find(u => u.id === id); }
function addUser(nm, em, pw) {
  const u = { id: nid('u'), nombre: nm.trim(), email: em.trim().toLowerCase(), password: pw, creado: hoy() };
  MEM.usuarios.push(u); trySave(); return u;
}

// ── Plantas ──
function plantas(uid)    { return MEM.plantas.filter(p => p.uid === uid); }
function plantaById(id)  { return MEM.plantas.find(p => p.id === id); }
function addPlanta(uid, em, nm, sp, ty, hl) {
  const p = { id: nid('p'), uid, emoji: em, nombre: nm.trim(), especie: sp.trim(), tipo: ty, salud: hl, creado: hoy() };
  MEM.plantas.push(p); trySave(); return p;
}
function updSalud(pid, s) {
  const p = MEM.plantas.find(x => x.id === pid);
  if (p) { p.salud = s; trySave(); }
}
function delPlanta(pid) {
  MEM.plantas = MEM.plantas.filter(p => p.id !== pid);
  MEM.diario  = MEM.diario.filter(d => d.planta_id !== pid);
  MEM.diags   = MEM.diags.filter(d => d.planta_id !== pid);
  trySave();
}

// ── Diario ──
function diarioUser(uid, lim)  { return MEM.diario.filter(d => d.uid === uid).slice(-lim||MEM.diario.length).reverse(); }
function diarioPlanta(pid, lim){ return MEM.diario.filter(d => d.planta_id === pid).slice(-lim||10).reverse(); }
function addDiario(pid, uid, act, hl, nt) {
  const d = { id: nid('d'), planta_id: pid, uid, actividad: act, salud: hl, nota: nt, fecha: hoy() };
  MEM.diario.push(d); trySave(); return d;
}

// ── Diagnósticos ──
function diagsUser(uid, lim) { return MEM.diags.filter(d => d.uid === uid).slice(-lim||10).reverse(); }
function addDiag(uid, pid, cond, hl, res) {
  const d = { id: nid('g'), uid, planta_id: pid, condicion: cond, salud: hl, resultado: res, fecha: hoy() };
  MEM.diags.push(d); trySave(); return d;
}

// ════════════════════════════════════════════════
// ESTADO
// ════════════════════════════════════════════════
let CU = null, CN = 'home', SE = '🌵';
let camStream = null, capB64 = null;

const TIPS = [
  "Las plantas de interior liberan O₂ y absorben CO₂: tus aliadas para un hogar saludable.",
  "El riego temprano reduce la evaporación hasta un 40% comparado con el mediodía.",
  "La albahaca repele insectos naturalmente, sin pesticidas.",
  "Un suelo bien drenado es más importante que el riego frecuente.",
  "Hojas amarillas suelen indicar exceso de agua, no falta.",
  "Girar tu planta 90° cada semana asegura un crecimiento uniforme.",
  "El compost casero reduce residuos orgánicos hasta un 30%.",
  "Lavar las hojas con agua tibia mejora la fotosíntesis un 15%.",
  "Un jardín de 5m² puede producir hasta 20kg de verduras al año.",
  "Las flores atraen polinizadores que benefician todo el ecosistema.",
];

// ════════════════════════════════════════════════
// ARRANQUE — sin dependencias externas
// ════════════════════════════════════════════════
(function arrancar() {
  tryLoad();
  // El splash se va automáticamente con CSS animation
  // Solo necesitamos esconder después de 2.2s
  setTimeout(function() {
    var sp = document.getElementById('splash');
    if (sp) { sp.classList.add('out'); setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 800); }
    // Auto-login por sesión (memoria)
    if (CU) { loginOK(CU); }
  }, 2200);
})();

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
function stab(t) {
  document.querySelectorAll('.atab').forEach(function(e,i){ e.classList.toggle('on', (i===0&&t==='login')||(i===1&&t==='reg')); });
  document.getElementById('af-login').classList.toggle('on', t==='login');
  document.getElementById('af-reg').classList.toggle('on', t==='reg');
  // Limpiar errores
  ['err-login','err-reg'].forEach(function(id){ var el=document.getElementById(id); if(el){ el.classList.remove('on'); el.textContent=''; }});
}

function showErr(id, msg) {
  var el = document.getElementById(id);
  if (!el) return;
  el.textContent = '⚠️ ' + msg;
  el.classList.add('on');
  // Scroll para que se vea
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function getVal(id) {
  var el = document.getElementById(id);
  return el ? el.value || '' : '';
}

function doLogin() {
  var em = getVal('li-em').trim();
  var pw = getVal('li-pw');
  document.getElementById('err-login').classList.remove('on');

  if (!em) { showErr('err-login', 'Ingresa tu correo electrónico'); return; }
  if (!pw) { showErr('err-login', 'Ingresa tu contraseña'); return; }

  var u = userByEmail(em);
  if (!u) { showErr('err-login', 'No existe una cuenta con ese correo'); return; }
  if (u.password !== pw) { showErr('err-login', 'Contraseña incorrecta'); return; }

  loginOK(u);
}

function doReg() {
  var nm = getVal('re-nm').trim();
  var em = getVal('re-em').trim();
  var pw = getVal('re-pw');
  document.getElementById('err-reg').classList.remove('on');

  if (!nm) { showErr('err-reg', 'Ingresa tu nombre completo'); return; }
  if (!em) { showErr('err-reg', 'Ingresa tu correo electrónico'); return; }
  if (!em.includes('@')) { showErr('err-reg', 'Ingresa un correo válido (debe tener @)'); return; }
  if (!pw) { showErr('err-reg', 'Crea una contraseña'); return; }
  if (pw.length < 6) { showErr('err-reg', 'La contraseña debe tener al menos 6 caracteres'); return; }
  if (userByEmail(em)) { showErr('err-reg', 'Ya existe una cuenta con ese correo'); return; }

  var u = addUser(nm, em, pw);
  // Planta demo para que no esté vacío
  addPlanta(u.id, '🌿', 'Mi primera planta', 'Planta de inicio', 'Interior', 80);
  toast('¡Cuenta creada exitosamente! 🌱');
  loginOK(u);
}

function demoLogin() {
  // Usuario demo que siempre existe en memoria
  var em = 'demo@ecohuella.app';
  var u = userByEmail(em);
  if (!u) {
    u = addUser('Usuario Demo', em, 'demo123');
    addPlanta(u.id, '🌵', 'Cactus Demo', 'Cactus mammillaria', 'Interior', 85);
    addPlanta(u.id, '🌿', 'Pothos Verde', 'Epipremnum aureum', 'Interior', 72);
    addDiario(MEM.plantas[MEM.plantas.length-2].id, u.id, '🚿 Riego', 85, 'Regado con agua sin cloro');
  }
  toast('Entrando en modo demo 👀');
  loginOK(u);
}

function loginOK(u) {
  CU = u;
  document.getElementById('scr-auth').classList.remove('on');
  document.getElementById('scr-main').classList.add('on');
  document.getElementById('hnm').textContent = u.nombre.split(' ')[0];
  nav('home');
}

function doLogout() {
  stopCam(); CU = null;
  document.getElementById('scr-main').classList.remove('on');
  document.getElementById('scr-auth').classList.add('on');
  document.getElementById('li-em').value = '';
  document.getElementById('li-pw').value = '';
  stab('login');
  toast('Sesión cerrada');
}

// ════════════════════════════════════════════════
// NAVEGACIÓN
// ════════════════════════════════════════════════
function nav(s) {
  CN = s;
  document.querySelectorAll('.ni').forEach(function(n){ n.classList.remove('on'); });
  var ni = document.getElementById('ni-'+s); if (ni) ni.classList.add('on');
  if (s !== 'diag') stopCam();
  var mc = document.getElementById('mc');
  if (!mc) return;
  switch(s) {
    case 'home':    mc.innerHTML = rHome(); break;
    case 'plantas': mc.innerHTML = rPlantas(); break;
    case 'diag':    mc.innerHTML = rDiag(); break;
    case 'com':     mc.innerHTML = rCom(); break;
    case 'perfil':  mc.innerHTML = rPerfil(); break;
  }
}

// ════════════════════════════════════════════════
// HOME
// ════════════════════════════════════════════════
function rHome() {
  var pl = plantas(CU.id);
  var tip = TIPS[new Date().getDay() % TIPS.length];
  var eco = pl.length ? Math.round(pl.reduce(function(s,p){ return s+p.salud; },0) / pl.length) : 0;
  var alts = '';
  pl.slice(0,3).forEach(function(p){
    var cls = p.salud<40?'urg':p.salud<65?'hoy':'okb';
    var txt = cls==='urg'?'¡Urgente!':cls==='hoy'?'Hoy':'Bien';
    alts += '<div class="alc"><div class="ali">💧</div><div><div style="font-size:14px;font-weight:600">'+p.emoji+' '+p.nombre+'</div><div style="font-size:12px;color:var(--gr)">Riego recomendado</div></div><span class="alb '+cls+'">'+txt+'</span></div>';
  });
  if (!alts) alts = '<div class="est"><div class="esti">✅</div><div class="estt">Sin alertas pendientes</div></div>';
  return '<div class="hero"><h2>¡Hola, '+CU.nombre.split(' ')[0]+'! 🌿</h2><p>Tu huella ambiental importa cada día que cuidas tu entorno verde.</p><div class="eco-row"><div class="ecb"><span class="ecn">'+eco+'%</span><span class="ecl">Salud prom.</span></div><div class="ecb"><span class="ecn">'+pl.length+'</span><span class="ecl">Plantas</span></div></div></div>'
    +'<div class="sec">Acciones rápidas</div>'
    +'<div class="qgrid"><div class="qc" onclick="openP()"><div class="qi">🌱</div><div class="qt">Agregar planta</div><div class="qs">Registra una nueva</div></div><div class="qc" onclick="nav(\'diag\')"><div class="qi">🔬</div><div class="qt">Diagnóstico IA</div><div class="qs">Analiza con cámara</div></div><div class="qc" onclick="openD()"><div class="qi">📔</div><div class="qt">Diario</div><div class="qs">Nueva entrada</div></div><div class="qc" onclick="nav(\'com\')"><div class="qi">🤝</div><div class="qt">Viveros</div><div class="qs">Contacta expertos</div></div></div>'
    +'<div class="sec">Mis plantas</div>'+rProw(pl)
    +'<div class="sec">Alertas de cuidado</div><div class="alst">'+alts+'</div>'
    +'<div class="sec">💡 Dato curioso del día</div><div class="tip"><div class="tipl">EcoHuella te informa</div><div class="tipt">'+tip+'</div></div>';
}

function rProw(pl) {
  if (!pl.length) return '<div class="est"><div class="esti">🌵</div><div class="estt">Aún no tienes plantas.<br>¡Agrega tu primera!</div><br><button class="btnp" type="button" style="width:auto;padding:12px 24px;display:block;margin:0 auto" onclick="openP()">+ Agregar planta</button></div>';
  return '<div class="prow">'+pl.map(function(p){ return '<div class="pc" onclick="showPlanta('+p.id+')"><div class="pe">'+p.emoji+'</div><div class="pn">'+p.nombre+'</div><div class="ps">'+(p.especie||p.tipo||'Sin especie')+'</div><div class="hb"><div class="hbf" style="width:'+p.salud+'%"></div></div><div class="hbt">Salud: '+p.salud+'%</div></div>'; }).join('')+'</div>';
}

// ════════════════════════════════════════════════
// PLANTAS
// ════════════════════════════════════════════════
function rPlantas() {
  var pl = plantas(CU.id);
  var di = diarioUser(CU.id, 8);
  var dH = di.length ? di.map(function(e){
    var p = plantaById(e.planta_id);
    return '<div class="de"><div class="demeta"><div class="dep">'+(p?p.emoji+' '+p.nombre:'🌿')+'</div><div class="ded">'+e.fecha+'</div></div><div class="den">'+e.actividad+' — '+(e.nota||'Sin obs.')+'</div><div class="deh"><div class="dehl">Salud:</div><div class="dehn">'+e.salud+'%</div></div></div>';
  }).join('') : '<div class="est"><div class="esti">📔</div><div class="estt">Sin entradas en el diario aún</div></div>';
  return '<div style="padding:14px;display:flex;justify-content:space-between;align-items:center"><div style="font-family:\'Playfair Display\',serif;font-size:22px;font-weight:700">Mis Plantas 🌿</div><button class="btnp" type="button" style="width:auto;padding:9px 18px;font-size:13px" onclick="openP()">+ Agregar</button></div>'
    +rProw(pl)
    +'<div style="margin-top:14px"><div style="display:flex;justify-content:space-between;align-items:center;padding:0 14px 8px"><div class="sec" style="padding:0">Diario de crecimiento</div><button type="button" onclick="openD()" style="background:transparent;border:1.5px solid var(--v);color:var(--v);border-radius:50px;padding:6px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:\'DM Sans\',sans-serif">+ Entrada</button></div>'+dH+'</div>';
}

// ════════════════════════════════════════════════
// DIAGNÓSTICO
// ════════════════════════════════════════════════
function rDiag() {
  var pl = plantas(CU.id);
  var hist = diagsUser(CU.id, 6);
  var pOpts = pl.map(function(p){ return '<option value="'+p.id+'">'+p.emoji+' '+p.nombre+'</option>'; }).join('');
  var hH = hist.length ? hist.map(function(d){ return '<div class="de"><div class="demeta"><div class="dep">🔬 '+(d.condicion||'Diagnóstico')+'</div><div class="ded">'+d.fecha+'</div></div><div class="den" style="font-size:12px;color:var(--gr)">Salud estimada: <strong style="color:var(--v)">'+d.salud+'%</strong></div></div>'; }).join('') :
    '<div class="est"><div class="esti">🔬</div><div class="estt">Sin diagnósticos guardados aún</div></div>';
  return '<div style="padding:14px 14px 4px;font-family:\'Playfair Display\',serif;font-size:22px;font-weight:700">Diagnóstico 🔬</div>'
    +'<div class="ai-badge"><div class="ai-dot"></div>Claude AI Vision · Botánico experto real</div>'
    +(pl.length?'<div style="padding:0 14px 10px"><label class="fl">Planta a diagnosticar</label><select class="si" id="dpsel"><option value="">🌿 General (sin planta)</option>'+pOpts+'</select></div>':'')
    +'<div class="dwrap">'
      +'<div class="czn" id="czn">'
        +'<div class="cph" id="cph"><div class="ci">📷</div><div class="ct">Activa la cámara</div><div class="cs">Apunta a tu planta para diagnóstico real con IA botánica</div></div>'
        +'<video id="cvid" autoplay playsinline muted style="display:none;width:100%;max-height:320px;object-fit:cover"></video>'
        +'<canvas id="ccan" style="display:none"></canvas>'
        +'<img id="cprev" style="display:none;width:100%;max-height:320px;object-fit:cover" alt="">'
        +'<div class="vfx" id="vfx" style="display:none"><div class="vfc tl"></div><div class="vfc tr"></div><div class="vfc bl"></div><div class="vfc br"></div><div class="vfs"></div><div class="vfbg">🔬 ESCANEANDO</div></div>'

// ── CÁMARA ──
async function startCam() {
  try {
    camStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    var vid = document.getElementById('cvid');
    if (!vid) return;
    vid.srcObject = camStream; vid.style.display = 'block';
    setD('cph','none'); setD('vfx','flex'); showCtrl(1);
  } catch(e) {
    toast('No se pudo acceder a la cámara. Usa Galería para subir una foto.');
  }
}
function stopCam() {
  if (camStream) { camStream.getTracks().forEach(function(t){t.stop();}); camStream = null; }
  var v=document.getElementById('cvid'); if(v) v.style.display='none';
  var p=document.getElementById('cprev'); if(p) p.style.display='none';
  setD('cph','flex'); setD('vfx','none'); showCtrl(0); capB64=null;
}
function snap() {
  var vid=document.getElementById('cvid'), can=document.getElementById('ccan');
  can.width=vid.videoWidth||640; can.height=vid.videoHeight||480;
  can.getContext('2d').drawImage(vid,0,0,can.width,can.height);
  showPrev(can.toDataURL('image/jpeg',.88));
  if(camStream){camStream.getTracks().forEach(function(t){t.stop();}); camStream=null;}
}
function loadGal(e) {
  var f=e.target.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(ev){ showPrev(ev.target.result); };
  r.readAsDataURL(f); e.target.value='';
}
function showPrev(durl) {
  capB64=durl.split(',')[1];
  var p=document.getElementById('cprev'), v=document.getElementById('cvid');
  if(p){p.src=durl; p.style.display='block';}
  if(v) v.style.display='none';
  setD('cph','none'); setD('vfx','none'); showCtrl(2);
}
function retake() { capB64=null; var p=document.getElementById('cprev'); if(p) p.style.display='none'; setD('cph','flex'); showCtrl(0); }
function showCtrl(n) { ['cc0','cc1','cc2'].forEach(function(id,i){ var el=document.getElementById(id); if(el) el.style.display=i===n?'flex':'none'; }); }
function setD(id, d) { var el=document.getElementById(id); if(el) el.style.display=d; }

// ── CLAUDE AI ──
async function analyze() {
  if (!capB64) { toast('Primero toma o sube una foto'); return; }
  var selEl=document.getElementById('dpsel');
  var pid=selEl?parseInt(selEl.value)||null:null;
  var plant=pid?plantaById(pid):null;
  showCtrl(-1);
  var ail=document.getElementById('ail'); if(ail) ail.classList.add('on');
  var dr=document.getElementById('dr'); if(dr) dr.innerHTML='';
  var steps=['as0','as1','as2'], si=0;
  var iv=setInterval(function(){
    if(si>0){var prev=document.getElementById(steps[si-1]);if(prev&&!prev.classList.contains('dn')){prev.classList.remove('act');prev.textContent='✅ '+prev.textContent.slice(3);prev.classList.add('dn');}}
    if(si<steps.length){var cur=document.getElementById(steps[si]);if(cur)cur.classList.add('act');si++;}
  },1900);
  try {
    var ctx=plant?'La planta es: '+plant.nombre+' ('+( plant.especie||plant.tipo||'desconocido')+'), salud registrada '+plant.salud+'%.':'Sin planta registrada.';
    var sys='Eres EcoHuella AI, botánico experto con 20 años en diagnóstico fitosanitario y agronomía tropical en Latinoamérica.\n\nREGLAS:\n- Responde SOLO en español\n- Analiza color de hojas, tallo, turgencia, manchas, plagas\n- Proporciona consejos aplicables en Venezuela\n\nResponde ÚNICAMENTE con este JSON válido (sin markdown ni texto extra):\n{\n  "especie_detectada": "nombre común y científico",\n  "condicion_detectada": "diagnóstico en 4-6 palabras",\n  "causa_principal": "explicación en 1-2 oraciones",\n  "porcentaje_salud": 75,\n  "indicadores_positivos": ["señal 1", "señal 2"],\n  "indicadores_negativos": ["problema 1", "problema 2"],\n  "primeros_auxilios": ["acción 1","acción 2","acción 3","acción 4","acción 5"],\n  "cuidados_preventivos": ["prevención 1","prevención 2","prevención 3"],\n  "nivel_urgencia": "bajo",\n  "resumen_profesional": "4-5 oraciones de análisis completo."\n}';
    var resp = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1200,system:sys,messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/jpeg',data:capB64}},{type:'text',text:ctx+'\n\nAnaliza esta imagen botánicamente y proporciona diagnóstico profesional completo.'}]}]})});
    clearInterval(iv);
    steps.forEach(function(s){var el=document.getElementById(s);if(el){el.classList.remove('act');el.classList.add('dn');}});
    if(!resp.ok){var ed=await resp.json().catch(function(){return{};});throw new Error(ed.error&&ed.error.message?ed.error.message:'Error '+resp.status);}
    var data=await resp.json();
    var rawTxt=data.content&&data.content.find(function(c){return c.type==='text';})?data.content.find(function(c){return c.type==='text';}).text:'';
    var result;
    try{result=JSON.parse(rawTxt.replace(/```json|```/g,'').trim());}
    catch(e){result={especie_detectada:'Planta analizada',condicion_detectada:'Ver análisis',causa_principal:'Análisis por IA',porcentaje_salud:70,indicadores_positivos:['Analizado'],indicadores_negativos:[],primeros_auxilios:['Revisa el análisis'],cuidados_preventivos:['Monitorea tu planta'],nivel_urgencia:'bajo',resumen_profesional:rawTxt};}
    if(ail) ail.classList.remove('on');
    var salud=Math.max(10,Math.min(100,parseInt(result.porcentaje_salud)||70));
    if(plant) updSalud(plant.id,salud);
    addDiag(CU.id,pid,result.condicion_detectada||'Diagnóstico',salud,JSON.stringify(result));
    showResult(result,plant,salud);
  } catch(err) {
    clearInterval(iv);
    if(ail) ail.classList.remove('on');
    showCtrl(2);
    toast('⚠️ Error IA: '+err.message+' (Requiere HTTPS)');
  }
}

function showResult(r,plant,salud){
  var col=salud>=75?'#2C5F2D':salud>=50?'#D97706':'#C0392B';
  var urgMap={bajo:'#166534|#F0FDF4',moderado:'#92400E|#FEF3C7',alto:'#9A3412|#FEF2F2',crítico:'#7F1D1D|#FEE2E2'};
  var parts=(urgMap[r.nivel_urgencia]||urgMap['bajo']).split('|');
  var uc=parts[0],ubg=parts[1];
  var tP=(r.indicadores_positivos||[]).map(function(t){return '<span class="dtag tg">✅ '+t+'</span>';}).join('');
  var tN=(r.indicadores_negativos||[]).map(function(t){return '<span class="dtag tr">⚠️ '+t+'</span>';}).join('');
  var ics=['🩺','💊','🌿','💧','☀️'];
  var aux=(r.primeros_auxilios||[]).map(function(a,i){return '<div class="axitem"><div class="axic">'+(ics[i]||'🩺')+'</div><div class="axtx">'+a+'</div></div>';}).join('');
  var prev=(r.cuidados_preventivos||[]).map(function(a){return '<div class="axitem"><div class="axic">🔮</div><div class="axtx">'+a+'</div></div>';}).join('');
  var dr=document.getElementById('dr'); if(!dr) return;
  dr.innerHTML='<div class="drh"><div class="drp">'+(plant?plant.emoji+' '+plant.nombre:'🔬 Análisis Botánico')+'</div><div class="drsp">'+(r.especie_detectada||'')+' · '+hoy()+'</div></div>'
    +'<div class="drsc"><div class="drsn" style="color:'+col+'">'+salud+'%</div><div class="drsl">Índice de salud</div><div style="margin-top:8px"><span style="color:'+uc+';background:'+ubg+';font-size:12px;font-weight:700;padding:3px 12px;border-radius:50px">Urgencia: '+(r.nivel_urgencia||'bajo')+'</span></div></div>'
    +'<div class="drb"><div class="drst">Condición detectada</div><div class="drcd">'+r.condicion_detectada+'</div><div class="drcz">'+r.causa_principal+'</div>'
    +((tP||tN)?'<div class="drst">Indicadores observados</div>'+tP+tN:'')
    +'<div class="drst">Primeros auxilios</div>'+aux
    +(prev?'<div class="drst">Cuidados preventivos</div>'+prev:'')
    +'<div class="drst">Análisis profesional completo</div><div class="drfull">'+(r.resumen_profesional||'')+'</div></div>'
    +'<button class="btnsave" type="button" onclick="toast(\'Diagnóstico guardado ✅\');nav(\'diag\')">Guardar diagnóstico</button>';
}
